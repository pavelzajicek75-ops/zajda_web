<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ZAJDA WEB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; }
        .post-card { transition: transform 0.2s; }
        .post-card:hover { transform: translateY(-5px); }
        .aspect-video-custom { aspect-ratio: 16 / 9; object-fit: cover; }
    </style>
</head>
<body class="p-4 md:p-12">
    <header class="max-w-6xl mx-auto mb-12 text-center">
        <h1 class="text-6xl font-black text-slate-900 tracking-tighter">ZAJDA WEB</h1>
        <p class="text-slate-500 mt-2 font-medium">Fotografie & Cesty</p>
    </header>

    <div id="content" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Tady se budou načítat články -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function loadPosts() {
            const response = await fetch('https://api.github.com/repos/pavelzajicek75-ops/zajda_web/contents/_posts');
            const files = await response.json();
            const container = document.getElementById('content');

            for (const file of files) {
                if (file.name.endsWith('.md')) {
                    const res = await fetch(file.download_url);
                    const text = await res.text();
                    const parts = text.split('---');
                    const yaml = parts[1];
                    const body = parts[2];

                    // Jednoduchý vytahovač dat z YAML
                    const title = yaml.match(/title:\s*"(.*)"/) || yaml.match(/title:\s*(.*)/);
                    const image = yaml.match(/image:\s*"(.*)"/) || yaml.match(/image:\s*(.*)/);

                    const card = `
                        <div class="post-card bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl border border-slate-200">
                            <img src="${image ? image[1] : ''}" class="w-full aspect-video-custom">
                            <div class="p-6">
                                <h2 class="text-2xl font-bold text-slate-800">${title ? title[1] : 'Bez nadpisu'}</h2>
                                <div class="mt-4 prose prose-slate line-clamp-3">
                                    ${marked.parse(body)}
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                }
            }
        }
        loadPosts();
    </script>
</body>
</html>

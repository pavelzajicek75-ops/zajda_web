<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editace článku</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #333;
            color: white;
            font-size: 15px;
        }

        textarea {
            height: 300px;
            resize: vertical;
        }

        button {
            padding: 12px 20px;
            background: #4CAF50;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #45a049;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #aaa;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">

        <a href="/admin/articles.html" class="back">← Zpět na seznam článků</a>

        <h2>Editace článku</h2>

        <input type="text" id="title" placeholder="Název článku">
        <textarea id="content" placeholder="Obsah článku"></textarea>

        <button onclick="saveArticle()">Uložit změny</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get("id");

        async function loadArticle() {
            const token = localStorage.getItem("admin_token");
            if (!token) return window.location.href = "/admin/login.html";

            const res = await fetch(`/api/admin/posts/get?id=${articleId}`, {
                headers: { "Authorization": `Bearer ${token}` }
            });

            const article = await res.json();

            document.getElementById("title").value = article.title || "";
            document.getElementById("content").value = article.content || "";
        }

        async function saveArticle() {
            const token = localStorage.getItem("admin_token");

            const body = {
                id: articleId,
                title: document.getElementById("title").value,
                content: document.getElementById("content").value
            };

            const res = await fetch("/api/admin/posts/update", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });

            if (!res.ok) {
                alert("Nepodařilo se uložit změny.");
                return;
            }

            alert("Článek uložen!");
            window.location.href = "/admin/articles.html";
        }

        loadArticle();
    </script>
</body>
</html>

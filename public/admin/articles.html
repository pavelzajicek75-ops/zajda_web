<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Články</title>
  <style>
    body { margin:0; padding:0; background:#0d0d0d; color:white; font-family:Arial; }
    .container { max-width:900px; margin:40px auto; padding:20px; background:#1a1a1a; border-radius:10px; }
    .article { padding:12px; margin-bottom:10px; background:#262626; border-radius:6px; }
    a.btn { display:inline-block; padding:8px 12px; background:#4CAF50; color:white; text-decoration:none; border-radius:4px; margin-right:8px; }
    a.btn:hover { background:#45a049; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Seznam článků</h2>
    <p><a class="btn" href="/admin/new-article.html">+ Nový článek</a></p>
    <div id="list"></div>
  </div>

  <script>
    async function loadArticles() {
      const token = localStorage.getItem("admin_token");
      if (!token) { window.location.href = "/admin/login.html"; return; }

      const res = await fetch("/api/admin/posts/list", {
        headers: { "Authorization": `Bearer ${token}` }
      });

      const articles = await res.json();
      const box = document.getElementById("list");
      box.innerHTML = "";

      articles.forEach(a => {
        box.innerHTML += `
          <div class="article">
            <strong>${a.title}</strong><br/>
            <a class="btn" href="/admin/edit-article.html?id=${a.id}">Upravit</a>
          </div>
        `;
      });
    }

    loadArticles();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Články</title>
</head>

<body>
    <script src="/admin/auth.js"></script>
    <script>const token = requireAuth();</script>

    <h2>Seznam článků</h2>

    <a href="/admin/new-article.html">+ Nový článek</a>

    <div id="articles"></div>

    <script>
        async function loadArticles() {
            const res = await fetch("/api/admin/posts/list", {
                headers: { "Authorization": `Bearer ${token}` }
            });

            const articles = await res.json();
            const box = document.getElementById("articles");

            articles.forEach(a => {
                box.innerHTML += `
                    <div>
                        <h3>${a.title}</h3>
                        <a href="/admin/edit-article.html?id=${a.id}">Upravit</a>
                    </div>
                `;
            });
        }

        loadArticles();
    </script>
</body>
</html>

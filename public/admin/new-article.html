<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nový článek</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            color: white;
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #333;
            color: white;
            font-size: 15px;
        }

        textarea {
            height: 300px;
            resize: vertical;
        }

        button {
            padding: 12px 20px;
            background: #4CAF50;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #45a049;
        }

        .back {
            display: inline-block;
            margin-bottom: 20px;
            color: #aaa;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">

        <a href="/admin/articles.html" class="back">← Zpět na seznam článků</a>

        <h2>Nový článek</h2>

        <input type="text" id="title" placeholder="Název článku">
        <textarea id="content" placeholder="Obsah článku"></textarea>

        <button onclick="createArticle()">Vytvořit článek</button>
    </div>

    <script>
        async function createArticle() {
            const token = localStorage.getItem("admin_token");
            if (!token) return window.location.href = "/admin/login.html";

            const title = document.getElementById("title").value.trim();
            const content = document.getElementById("content").value.trim();

            if (!title || !content) {
                alert("Vyplň název i obsah článku.");
                return;
            }

            const body = { title, content };

            const res = await fetch("/api/admin/posts/create", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });

            if (!res.ok) {
                alert("Nepodařilo se vytvořit článek.");
                return;
            }

            alert("Článek vytvořen!");
            window.location.href = "/admin/articles.html";
        }
    </script>
</body>
</html>

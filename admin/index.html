  <script>
    // Nový vzhled náhledu - moderní tmavý styl s menšími fotkami
    CMS.registerPreviewStyle("https://cdn.tailwindcss.com");
    CMS.registerPreviewStyle(`
      body { background-color: #f8fafc; padding: 40px !important; font-family: 'Inter', sans-serif; }

      .meta { color: #64748b; font-size: 0.9rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.05em; }
    `);

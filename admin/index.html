<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zajda Admin - Uploadcare</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="https://unpkg.com/netlify-cms-media-library-uploadcare@^0.5.10/dist/netlify-cms-media-library-uploadcare.js"></script>

  <script>
    // Registrace knihovny pro nahrávání
    CMS.registerMediaLibrary(NetlifyCmsMediaLibraryUploadcare);

    CMS.init({
      config: {
        backend: { 
          name: "github",
          repo: "pavelzajicek75-ops/zajda_web",
          branch: "main"
        },
        media_library: {
          name: "uploadcare",
          config: {
            // Tvůj klíč ze screenshotu image_3da441.jpg
            publicKey: "fb584abdf0298377bbd6" 
          }
        },
        collections: [{
          name: "posts",
          label: "Příspěvky",
          folder: "_posts",
          create: true,
          fields: [
            {label: "Titulek", name: "title", widget: "string"},
            {label: "Datum", name: "date", widget: "datetime"},
            {label: "Úvodní foto", name: "image", widget: "image"},
            {label: "Text článku", name: "body", widget: "markdown"}
          ]
        }]
      }
    });
  </script>
</body>
</html>

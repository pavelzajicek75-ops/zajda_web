<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrace Zajda Web</title>
  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Nastavení Uploadcare natvrdo v prohlížeči
    window.UPLOADCARE_PUBLIC_KEY = 'demopublickey';
    window.UPLOADCARE_PREVIEW_STEP = true;
    window.UPLOADCARE_EFFECTS = 'crop,rotate,enhance,sharp';
    window.UPLOADCARE_IMAGE_SHRINK = '1600x1600 80%';

    // BRUTÁLNÍ STYLING: Sleduje změny na stránce a okamžitě zmenšuje fotky
    const observer = new MutationObserver(() => {
      const images = document.querySelectorAll('[class*="PreviewPaneContent"] img, .nc-previewPane img');
      images.forEach(img => {
        img.style.maxWidth = '450px';
        img.style.width = '100%';
        img.style.height = 'auto';
        img.style.margin = '20px auto';
        img.style.display = 'block';
        img.style.borderRadius = '12px';
      });
    });

    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>

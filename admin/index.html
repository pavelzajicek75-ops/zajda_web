<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Zajda Admin - CLEAN</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="https://unpkg.com/netlify-cms-media-library-uploadcare@^0.5.10/dist/netlify-cms-media-library-uploadcare.js"></script>

  <script>
    // Zkusíme to zaregistrovat natvrdo pod novým názvem
    CMS.registerMediaLibrary(NetlifyCmsMediaLibraryUploadcare);

    CMS.init({
      config: {
        backend: { 
          name: "github",
          repo: "pavelzajicek75-ops/zajda_web",
          branch: "main"
        },
        // TADY JE ZMĚNA - Explicitně říkáme: ŽÁDNÝ CLOUDINARY
        media_library: {
          name: "uploadcare",
          config: {
            publicKey: "fb584abdf0298377bbd6" 
          }
        },
        collections: [{
          name: "clanky_nove", // Změna názvu kolekce donutí CMS se osvěžit
          label: "Příspěvky",
          folder: "_posts",
          create: true,
          fields: [
            {label: "Titulek", name: "title", widget: "string"},
            {label: "Foto", name: "image", widget: "image"},
            {label: "Text", name: "body", widget: "markdown"}
          ]
        }]
      }
    });
  </script>
</body>
</html>

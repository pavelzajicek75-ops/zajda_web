<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrace Zajda Web</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Tento skript "vstříkne" styl webu přímo do náhledového okna adminu
    CMS.registerPreviewStyle("https://cdn.tailwindcss.com");
    CMS.registerPreviewStyle(`
      body { background-color: #f8fafc !important; font-family: sans-serif !important; padding: 20px !important; }
      h1 { font-size: 2.5rem !important; font-weight: 900 !important; color: #000 !important; margin-bottom: 10px !important; }
      img { 
        max-width: 400px !important; /* Tady krotíme fotku v náhledu */
        height: auto !important; 
        display: block !important; 
        margin: 20px auto !important; 
        border-radius: 12px !important; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
      }
      .article-content { max-width: 600px !important; margin: 0 auto !important; }
    `);
  </script>
</body>
</html>

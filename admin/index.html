<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Zajda Admin - Direct Mode</title>
</head>
<body>
  <!-- Použijeme jen základní CMS bez externích doplňků media knihovny -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: { name: "test-repo" },
        // Zkusíme standardní nahrávání přímo do GitHubu, 
        // abychom zjistili, jestli není chyba v samotném Decapu
        media_folder: "assets/img",
        public_folder: "/assets/img",
        collections: [{
          name: "posts",
          label: "Články",
          folder: "_posts",
          create: true,
          fields: [
            {label: "Titulek", name: "title", widget: "string"},
            {label: "Foto", name: "image", widget: "image"},
            {label: "Text", name: "body", widget: "markdown"}
          ]
        }]
      }
    });
  </script>
</body>
</html>

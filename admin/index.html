<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Zajda Admin</title>
  <style>
    #auth-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif; }
    .modal { background: white; padding: 40px; border-radius: 2.5rem; width: 320px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
    button { background: #000; color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div class="modal">
      <h3>Zajda Admin</h3>
      <p style="font-size: 13px; color: #666;">Zadej heslo / Enter password</p>
      <input type="password" id="pass">
      <button onclick="checkPass()">OK</button>
    </div>
  </div>

  <script src="https://unpkg.com/netlify-cms-media-library-cloudinary@^1.3.0/dist/netlify-cms-media-library-cloudinary.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    CMS.registerMediaLibrary(NetlifyCmsMediaLibraryCloudinary);

    function checkPass() {
      if (document.getElementById('pass').value === "zajda2026") {
        document.getElementById('auth-overlay').style.display = 'none';
        // Tohle vynutí nové načtení Cloudinary údajů
        localStorage.removeItem('cms-cloudinary');
      } else { alert("Špatně / Wrong"); }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrace Zajda Web</title>
  <script>
    // Konfigurace musí být úplně první
    window.UPLOADCARE_PUBLIC_KEY = 'demopublickey';
    window.UPLOADCARE_LOCALE = 'cs';
    window.UPLOADCARE_PREVIEW_STEP = true;
    window.UPLOADCARE_EFFECTS = 'crop,resize,quality'; // To nejdůležitější pro tebe
  </script>
  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Skript pro zmenšení náhledu vpravo, aby nebyl obří jako na image_aa8a54.jpg
    setInterval(() => {
      const pane = document.querySelector('[class*="PreviewPaneContent"]');
      if (pane) {
        const imgs = pane.querySelectorAll('img');
        imgs.forEach(img => {
          img.style.maxWidth = '400px';
          img.style.height = 'auto';
          img.style.margin = '20px auto';
          img.style.display = 'block';
          img.style.borderRadius = '10px';
        });
      }
    }, 500);
  </script>
</body>
</html>

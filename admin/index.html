<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Zajda Admin - Cloudinary REBORN</title>
</head>
<body>
  <!-- Načtení CMS a Cloudinary pluginu -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="https://unpkg.com/netlify-cms-media-library-cloudinary@^1.3.0/dist/netlify-cms-media-library-cloudinary.js"></script>

  <script>
    // Registrace Cloudinary
    CMS.registerMediaLibrary(NetlifyCmsMediaLibraryCloudinary);

    CMS.init({
      config: {
        backend: { 
          name: "github",
          repo: "pavelzajicek75-ops/zajda_web",
          branch: "main"
        },
        // Konfigurace tvého Cloudinary
        media_library: {
          name: "cloudinary",
          config: {
            cloud_name: "dxf1lu1oi",
            api_key: "593899341857225",
            unsigned_upload: true,
            upload_preset: "zajda555"
          }
        },
        collections: [{
          name: "clanky_cloudinary",
          label: "Příspěvky",
          folder: "_posts",
          create: true,
          fields: [
            {label: "Titulek", name: "title", widget: "string"},
            {label: "Foto", name: "image", widget: "image"},
            {label: "Text", name: "body", widget: "markdown"}
          ]
        }]
      }
    });
  </script>
</body>
</html>

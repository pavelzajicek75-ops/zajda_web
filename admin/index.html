<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrace Zajda Web</title>
  <style>
    /* Stylování náhledu v adminu, aby vypadal jako web */
    #nc-root [class^="PreviewPaneContent"] {
      padding: 30px !important;
      background: #f8fafc !important;
    }
    #nc-root .article-preview img, 
    #nc-root img { 
      max-width: 400px !important; /* V náhledu adminu je zmenšíme ještě víc pro přehlednost */
      height: auto !important;
      display: block !important;
      margin: 20px auto !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1) !important;
    }
    #nc-root h1 { font-size: 2em !important; font-weight: bold !important; color: #000 !important; }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Registrace stylu pro náhled v reálném čase
    CMS.registerPreviewStyle("https://cdn.tailwindcss.com");
  </script>
</body>
</html>

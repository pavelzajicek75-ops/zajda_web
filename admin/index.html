<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zajda Admin</title>
  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Nastavení pro bezproblémový chod na Androidu
    window.UPLOADCARE_PUBLIC_KEY = 'demopublickey';
    window.UPLOADCARE_LOCALE = 'cs';
    window.UPLOADCARE_PREVIEW_STEP = true;
    window.UPLOADCARE_EFFECTS = 'crop,resize,quality';
    window.UPLOADCARE_IMAGES_ONLY = true;

    // Responzivní náhled – fotky se přizpůsobí šířce mobilu
    CMS.registerPreviewStyle("https://cdn.tailwindcss.com");
    CMS.registerPreviewStyle(`
      body { background: #f1f5f9; padding: 10px; }
      img { width: 100% !important; height: auto !important; border-radius: 15px; margin: 10px 0; }
      h1 { font-size: 1.8rem !important; font-weight: 900; }
    `);
  </script>
</body>
</html>

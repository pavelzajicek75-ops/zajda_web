<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrace Zajda Web</title>
  <script src="https://ucarecdn.com/libs/widget/3.x/uploadcare.full.min.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Globální nastavení pro všechna okna nahrávání
    UPLOADCARE_PUBLIC_KEY = 'demopublickey';
    UPLOADCARE_PREVIEW_STEP = true; 
    UPLOADCARE_EFFECTS = 'crop,rotate,enhance,sharp';

    // Styl, aby náhled vpravo byl WYSIWYG a fotky vlevo byly klikatelné
    CMS.registerPreviewStyle("https://cdn.tailwindcss.com");
    CMS.registerPreviewStyle(`
      img { max-width: 450px !important; border-radius: 10px; margin: 15px auto !important; display: block !important; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
      h1 { font-family: sans-serif; font-weight: 900; }
    `);
  </script>
</body>
</html>

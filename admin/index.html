<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zajda Admin</title>
  <style>
    #auth-overlay { position: fixed; inset: 0; background: #f3f4f6; display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif; }
    .modal { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 300px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    button { background: #000; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
    button:hover { background: #333; }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div class="modal">
      <h2 style="margin-top:0">Zajda Admin</h2>
      <input type="password" id="pass" placeholder="Zadej heslo" onkeypress="if(event.key==='Enter') checkPass()">
      <button onclick="checkPass()">Vstoupit</button>
    </div>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="https://unpkg.com/netlify-cms-media-library-cloudinary@^1.3.0/dist/netlify-cms-media-library-cloudinary.js"></script>

  <script>
    // Registrace knihovny Cloudinary
    CMS.registerMediaLibrary(NetlifyCmsMediaLibraryCloudinary);

    function checkPass() {
      const input = document.getElementById('pass').value;
      if (input === "zajda2026") {
        document.getElementById('auth-overlay').style.removeProperty('display');
        document.getElementById('auth-overlay').style.display = 'none';
        
        // Pokus o promazání starých chyb, pokud prohlížeč dovolí
        try { window.localStorage.clear(); } catch(e) {}
      } else {
        alert("Špatné heslo!");
      }
    }
  </script>
</body>
</html>

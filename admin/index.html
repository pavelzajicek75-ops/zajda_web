<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Zajda Admin</title>
  <!-- Přidáno pro lepší kompatibilitu -->
  <meta name="referrer" content="same-origin" />
  <style>
    #auth-overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif; }
    .modal { background: white; padding: 40px; border-radius: 2.5rem; width: 320px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
    button { background: #000; color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div class="modal">
      <h3>Zajda Admin</h3>
      <input type="password" id="pass" placeholder="Heslo">
      <button onclick="checkPass()">Vstoupit</button>
    </div>
  </div>

  <!-- Načtení CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="https://unpkg.com/netlify-cms-media-library-cloudinary@^1.3.0/dist/netlify-cms-media-library-cloudinary.js"></script>
  
  <script>
    function checkPass() {
      const pass = document.getElementById('pass').value;
      if (pass === "zajda2026") {
        try {
          // Pokusíme se vyčistit paměť, pokud to prohlížeč dovolí
          window.localStorage.clear();
        } catch (e) {
          console.warn("LocalStorage je blokován, admin může fungovat omezeně.");
        }
        document.getElementById('auth-overlay').style.display = 'none';
        
        // Inicializace Cloudinary po přihlášení
        if (window.CMS && window.NetlifyCmsMediaLibraryCloudinary) {
          CMS.registerMediaLibrary(NetlifyCmsMediaLibraryCloudinary);
        }
      } else {
        alert("Špatné heslo!");
      }
    }
  </script>
</body>
</html>

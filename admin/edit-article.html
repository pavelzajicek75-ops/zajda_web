<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Upravit článek</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background:#0b0c10; color:#e5e5e5; font-family:system-ui; padding:20px; margin:0; }
    .container { max-width:800px; margin:0 auto; }
    h1 { margin-top:0; }
    label { display:block; margin-bottom:6px; font-size:14px; }
    input,textarea {
      width:100%; padding:10px; margin-bottom:15px;
      border-radius:6px; border:1px solid #1f2937;
      background:#020617; color:white;
    }
    textarea { min-height:220px; resize:vertical; }
    .btn { padding:10px 16px; border-radius:6px; text-decoration:none; font-weight:600; cursor:pointer; border:none; }
    .btn-primary { background:#22c55e; color:#0b0c10; }
    .btn-primary:hover { background:#16a34a; }
    .btn-secondary { background:#1f2937; color:#e5e5e5; }
    .btn-secondary:hover { background:#111827; }
    .row { display:flex; gap:10px; }
    .error { color:#fca5a5; margin-bottom:10px; }
    .success { color:#6ee7b7; margin-bottom:10px; }
  </style>
</head>
<body>

<div class="container">
  <h1>Upravit článek</h1>

  <div id="error" class="error" style="display:none;"></div>
  <div id="success" class="success" style="display:none;"></div>

  <form id="form">
    <label>Název článku</label>
    <input type="text" id="title" required>

    <label>Obsah</label>
    <textarea id="content" required></textarea>

    <div class="row">
      <button type="submit" class="btn btn-primary">💾 Uložit změny</button>
      <a href="/admin/articles.html" class="btn btn-secondary">← Zpět</a>
    </div>
  </form>
</div>

<script>
  const token = localStorage.getItem('adminToken') || localStorage.getItem('token');
  const errorEl = document.getElementById('error');
  const successEl = document.getElementById('success');

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  if (!id) {
    errorEl.style.display = 'block';
    errorEl.textContent = 'Chybí ID článku.';
  }

  async function loadArticle() {
    try {
      const res = await fetch('/api/admin/articles/' + id, {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      const data = await res.json();

      document.getElementById('title').value = data.title;
      document.getElementById('content').value = data.content;

    } catch (err) {
      errorEl.style.display = 'block';
      errorEl.textContent = 'Nepodařilo se načíst článek.';
    }
  }

  loadArticle();

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const payload = {
      title: document.getElementById('title').value,
      content: document.getElementById('content').value,
      updatedAt: new Date().toISOString()
    };

    try {
      const res = await fetch('/api/admin/articles/' + id, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(text);
      }

      successEl.style.display = 'block';
      successEl.textContent = 'Článek byl upraven.';

      setTimeout(() => {
        window.location.href = '/admin/articles.html';
      }, 800);

    } catch (err) {
      errorEl.style.display = 'block';
      errorEl.textContent = err.message;
    }
  });
</script>

</body>
</html>

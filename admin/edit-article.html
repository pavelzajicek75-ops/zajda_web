<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editace článku</title>
  <style>
    body { background:#0d0d0d; color:white; font-family:Arial; margin:0; padding:0; }
    .container { max-width:900px; margin:40px auto; padding:20px; background:#1a1a1a; border-radius:10px; }
    input, textarea { width:100%; padding:12px; margin:10px 0; border-radius:6px; border:none; background:#333; color:white; font-size:15px; }
    textarea { min-height:260px; }
    button { padding:12px 20px; background:#4CAF50; border:none; border-radius:6px; color:white; cursor:pointer; }
    button:hover { background:#45a049; }
    a { color:#aaa; text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/admin/articles.html">← Zpět na články</a>
    <h2>Editace článku</h2>

    <input id="title" placeholder="Název článku" />
    <textarea id="content" placeholder="Obsah článku"></textarea>

    <button id="saveBtn">Uložit změny</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const articleId = params.get("id");

    async function loadArticle() {
      const token = localStorage.getItem("admin_token");
      if (!token) { window.location.href = "/admin/login.html"; return; }

      const res = await fetch(`/api/admin/posts/get?id=${articleId}`, {
        headers: { "Authorization": `Bearer ${token}` }
      });

      const article = await res.json();
      document.getElementById("title").value = article.title || "";
      document.getElementById("content").value = article.content || "";
    }

    async function saveArticle() {
      const token = localStorage.getItem("admin_token");

      const body = {
        id: articleId,
        title: document.getElementById("title").value,
        content: document.getElementById("content").value
      };

      await fetch("/api/admin/posts/update", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(body)
      });

      alert("Článek uložen");
      window.location.href = "/admin/articles.html";
    }

    document.getElementById("saveBtn").addEventListener("click", saveArticle);
    loadArticle();
  </script>
</body>
</html>

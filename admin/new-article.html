<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nový článek</title>
  <style>
    body { background:#0d0d0d; color:white; font-family:Arial; margin:0; padding:0; }
    .container { max-width:900px; margin:40px auto; padding:20px; background:#1a1a1a; border-radius:10px; }
    input, textarea { width:100%; padding:12px; margin:10px 0; border-radius:6px; border:none; background:#333; color:white; font-size:15px; }
    textarea { min-height:260px; }
    button { padding:12px 20px; background:#4CAF50; border:none; border-radius:6px; color:white; cursor:pointer; }
    button:hover { background:#45a049; }
    a { color:#aaa; text-decoration:none; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/admin/articles.html">← Zpět na články</a>
    <h2>Nový článek</h2>

    <input id="title" placeholder="Název článku" />
    <textarea id="content" placeholder="Obsah článku"></textarea>

    <button id="createBtn">Vytvořit článek</button>
  </div>

  <script>
    async function createArticle() {
      const token = localStorage.getItem("admin_token");

      const body = {
        title: document.getElementById("title").value,
        content: document.getElementById("content").value
      };

      const res = await fetch("/api/admin/posts/create", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(body)
      });

      alert("Článek vytvořen");
      window.location.href = "/admin/articles.html";
    }

    document.getElementById("createBtn").addEventListener("click", createArticle);
  </script>
</body>
</html>

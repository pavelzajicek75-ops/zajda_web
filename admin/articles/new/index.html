<!DOCTYPE html><h1 style="color:red">TEST — TOTO JE SPRÁVNÝ SOUBOR</h1> <html lang="cs"> <head><meta charset="utf-8"><title>Nový článek</title><link rel="stylesheet" href="/src/styles/admin.css"></head> <body> <div class="admin-container">  <h1>Nový článek</h1> <div class="layout"> <form id="articleForm" class="meta"> <label>Sekce</label> <select id="section"></select> <label>Podsekce</label> <select id="subsection"></select> <label>Datum</label> <input type="date" id="date" value="2026-05-17"> <label>Místo</label> <input type="text" id="location" placeholder="např. Brno, New York…"> <label>Název článku</label> <input type="text" id="title" placeholder="Název článku"> <button type="button" id="saveBtn" class="primary">💾 Uložit článek</button> </form> <div class="editor-card"> <div class="editor-toolbar" id="tiptap-toolbar"> <button data-action="bold"><b>B</b></button> <button data-action="italic"><i>I</i></button> <button data-action="heading1">H1</button> <button data-action="heading2">H2</button> <button data-action="bulletList">• List</button> <button data-action="orderedList">1. List</button> <button data-action="blockquote">„“</button> <button data-action="codeBlock">&lt;/&gt;</button> </div> <div id="tiptap-editor" class="tiptap"></div> </div> </div> <script type="module">
    import { Editor } from "https://cdn.skypack.dev/@tiptap/core";
    import StarterKit from "https://cdn.skypack.dev/@tiptap/starter-kit";

    const editor = new Editor({
      element: document.querySelector("#tiptap-editor"),
      extensions: [StarterKit],
      content: "<p>Napiš svůj článek…</p>"
    });

    // 🔥 FUNKČNÍ FETCH PRO CLOUDFLARE PAGES
    const res = await fetch("/data/sections.json");
    const sectionsData = await res.json();

    const sectionSelect = document.getElementById("section");
    const subsectionSelect = document.getElementById("subsection");

    // Naplnění sekcí
    Object.keys(sectionsData).forEach(sec => {
      const opt = document.createElement("option");
      opt.value = sec;
      opt.textContent = sec;
      sectionSelect.appendChild(opt);
    });

    // Naplnění podsekcí
    sectionSelect.addEventListener("change", () => {
      subsectionSelect.innerHTML = "";
      const subs = sectionsData[sectionSelect.value] || [];
      subs.forEach(sub => {
        const opt = document.createElement("option");
        opt.value = sub;
        opt.textContent = sub;
        subsectionSelect.appendChild(opt);
      });
    });

    // Inicializace
    sectionSelect.dispatchEvent(new Event("change"));
  </script>  </div> </body></html>

<!DOCTYPE html><html lang="cs"> <head><meta charset="utf-8"><title>Nový článek</title><link rel="stylesheet" href="/src/styles/admin.css"><style>body{background:#05060a;color:#f5f5f5}.layout[data-astro-cid-y7wmjtyx]{display:grid;grid-template-columns:300px 1fr;gap:2rem;margin-top:2rem}.meta[data-astro-cid-y7wmjtyx]{display:flex;flex-direction:column;gap:1.2rem}label[data-astro-cid-y7wmjtyx]{font-weight:500}input[data-astro-cid-y7wmjtyx],select[data-astro-cid-y7wmjtyx]{background:#0f172a;border:1px solid #1e293b;padding:.7rem 1rem;border-radius:.5rem;color:#f5f5f5}.editor-card[data-astro-cid-y7wmjtyx]{background:#0f172a;border:1px solid #1e293b;padding:1rem;border-radius:.5rem}.tiptap[data-astro-cid-y7wmjtyx]{min-height:400px;color:#fff}.primary[data-astro-cid-y7wmjtyx]{padding:.8rem 1.4rem;border-radius:999px;background:linear-gradient(135deg,#22c55e,#16a34a);color:#020617;font-weight:600;border:none;cursor:pointer;margin-top:1rem}
</style></head> <body> <div class="admin-container">  <h1 data-astro-cid-y7wmjtyx>Nový článek</h1> <div class="layout" data-astro-cid-y7wmjtyx> <form id="newForm" class="meta" data-astro-cid-y7wmjtyx> <label data-astro-cid-y7wmjtyx>Sekce</label> <select id="section" data-astro-cid-y7wmjtyx></select> <label data-astro-cid-y7wmjtyx>Podsekce</label> <select id="subsection" data-astro-cid-y7wmjtyx></select> <label data-astro-cid-y7wmjtyx>Datum</label> <input type="date" id="date" value="2026-05-18" data-astro-cid-y7wmjtyx> <label data-astro-cid-y7wmjtyx>Místo</label> <input type="text" id="location" placeholder="např. Brno, New York…" data-astro-cid-y7wmjtyx> <label data-astro-cid-y7wmjtyx>Název článku</label> <input type="text" id="title" placeholder="Název článku" data-astro-cid-y7wmjtyx> <button type="button" id="saveBtn" class="primary" data-astro-cid-y7wmjtyx>💾 Uložit článek</button> </form> <div class="editor-card" data-astro-cid-y7wmjtyx> <div id="tiptap-editor" class="tiptap" data-astro-cid-y7wmjtyx></div> </div> </div>  <script type="module">
    import { Editor } from "https://cdn.skypack.dev/@tiptap/core";
    import StarterKit from "https://cdn.skypack.dev/@tiptap/starter-kit";

    // Tiptap editor
    const editor = new Editor({
      element: document.querySelector("#tiptap-editor"),
      extensions: [StarterKit],
      content: "<p>Začni psát…</p>"
    });

    // 🔥 Načtení sekcí
    const res = await fetch("/data/sections.json");
    const sectionsData = await res.json();

    const sectionSelect = document.getElementById("section");
    const subsectionSelect = document.getElementById("subsection");

    // Naplnění sekcí
    Object.keys(sectionsData).forEach(sec => {
      const opt = document.createElement("option");
      opt.value = sec;
      opt.textContent = sec;
      sectionSelect.appendChild(opt);
    });

    // Naplnění podsekcí
    function fillSubsections() {
      subsectionSelect.innerHTML = "";
      const subs = sectionsData[sectionSelect.value] || [];
      subs.forEach(sub => {
        const opt = document.createElement("option");
        opt.value = sub;
        opt.textContent = sub;
        subsectionSelect.appendChild(opt);
      });
    }

    fillSubsections();
    sectionSelect.addEventListener("change", fillSubsections);

    // Uložení článku
    document.getElementById("saveBtn").onclick = async () => {
      const token = localStorage.getItem("admin_token");

      const body = {
        title: document.getElementById("title").value,
        date: document.getElementById("date").value,
        location: document.getElementById("location").value,
        section: sectionSelect.value,
        subsection: subsectionSelect.value,
        content: editor.getHTML()
      };

      const res = await fetch("/api/admin/save", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (data.success) {
        alert("Článek uložen");
        window.location.href = "/admin/articles";
      } else {
        alert("Chyba při ukládání");
      }
    };
  </script>   </div> </body></html>

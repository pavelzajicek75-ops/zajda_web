        </script> <header style="background:#1e1e1e;padding:15px;color:white;"> <nav> <a href="/admin" style="color:white;margin-right:20px;">Dashboard</a> <a href="/admin/articles" style="color:white;margin-right:20px;">Články</a> <a href="/admin/upload" style="color:white;">Upload</a> </nav> </header> <main style="padding:20px;">  <h1 data-astro-cid-y7wmjtyx>Nový článek</h1> <div class="layout" data-astro-cid-y7wmjtyx> <!-- LEVÝ PANEL – META --> <form id="articleForm" class="meta" data-astro-cid-y7wmjtyx> <label data-astro-cid-y7wmjtyx>Název článku</label> <input type="text" id="title" placeholder="Název článku" data-astro-cid-y7wmjtyx> <label data-astro-cid-y7wmjtyx>Datum</label> <input type="date" id="date" value="2026-05-17" data-astro-cid-y7wmjtyx> <label data-astro-cid-y7wmjtyx>Místo</label> <input type="text" id="location" placeholder="např. Brno, New York…" data-astro-cid-y7wmjtyx> <label data-astro-cid-y7wmjtyx>Sekce</label> <select id="section" data-astro-cid-y7wmjtyx></select> <label data-astro-cid-y7wmjtyx>Podsekce</label> <select id="subsection" data-astro-cid-y7wmjtyx></select> <button type="button" id="saveBtn" class="primary" data-astro-cid-y7wmjtyx>💾 Uložit článek</button> </form> <!-- PRAVÝ PANEL – TIPTAP --> <div class="editor-card" data-astro-cid-y7wmjtyx> <div class="editor-toolbar" id="tiptap-toolbar" data-astro-cid-y7wmjtyx> <button type="button" data-action="bold" data-astro-cid-y7wmjtyx><b data-astro-cid-y7wmjtyx>B</b></button> <button type="button" data-action="italic" data-astro-cid-y7wmjtyx><i data-astro-cid-y7wmjtyx>I</i></button> <button type="button" data-action="heading1" data-astro-cid-y7wmjtyx>H1</button> <button type="button" data-action="heading2" data-astro-cid-y7wmjtyx>H2</button> <button type="button" data-action="bulletList" data-astro-cid-y7wmjtyx>• List</button> <button type="button" data-action="orderedList" data-astro-cid-y7wmjtyx>1. List</button> <button type="button" data-action="blockquote" data-astro-cid-y7wmjtyx>„“</button> <button type="button" data-action="codeBlock" data-astro-cid-y7wmjtyx>&lt;/&gt;</button> <button type="button" id="uploadImageBtn" data-astro-cid-y7wmjtyx>📷 Vložit fotku</button> </div> <div id="tiptap-editor" class="tiptap" data-astro-cid-y7wmjtyx></div> </div> </div>    <script type="module">
    import { Editor } from "https://cdn.skypack.dev/@tiptap/core";
    import StarterKit from "https://cdn.skypack.dev/@tiptap/starter-kit";
    import Image from "https://cdn.skypack.dev/@tiptap/extension-image";

    const editor = new Editor({
      element: document.querySelector("#tiptap-editor"),
      extensions: [StarterKit, Image],
      content: "<p>Napiš svůj článek…</p>"
    });

    // SEKCE + PODSEKCE
    const sectionsData = JSON.parse(`<?= JSON.stringify(sectionsData) ?>`);
    const sectionSelect = document.getElementById("section");
    const subsectionSelect = document.getElementById("subsection");

    Object.keys(sectionsData).forEach(sec => {
      const opt = document.createElement("option");
      opt.value = sec;
      opt.textContent = sec;
      sectionSelect.appendChild(opt);
    });

    sectionSelect.addEventListener("change", () => {
      subsectionSelect.innerHTML = "";
      const subs = sectionsData[sectionSelect.value] || [];
      subs.forEach(sub => {
        const opt = document.createElement("option");
        opt.value = sub;
        opt.textContent = sub;
        subsectionSelect.appendChild(opt);
      });
    });

    sectionSelect.dispatchEvent(new Event("change"));

    // TOOLBAR
    document.getElementById("tiptap-toolbar").addEventListener("click", (e) => {
      const btn = e.target.closest("button");
      if (!btn) return;
      const action = btn.dataset.action;

      const actions = {
        bold: () => editor.chain().focus().toggleBold().run(),
        italic: () => editor.chain().focus().toggleItalic().run(),
        heading1: () => editor.chain().focus().toggleHeading({ level: 1 }).run(),
        heading2: () => editor.chain().focus().toggleHeading({ level: 2 }).run(),
        bulletList: () => editor.chain().focus().toggleBulletList().run(),
        orderedList: () => editor.chain().focus().toggleOrderedList().run(),
        blockquote: () => editor.chain().focus().toggleBlockquote().run(),
        codeBlock: () => editor.chain().focus().toggleCodeBlock().run(),
      };

      if (actions[action]) actions[action]();
    });

    // VLOŽIT FOTKU
    document.getElementById("uploadImageBtn").addEventListener("click", async () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.click();

      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append("file", file);

        const res = await fetch("/api/upload/image", {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        if (data.success && data.url) {
          editor.chain().focus().setImage({ src: data.url }).run();
        }
      };
    });

    // ULOŽIT ČLÁNEK
    document.getElementById("saveBtn").addEventListener("click", async () => {
      const body = {
        title: document.getElementById("title").value,
        date: document.getElementById("date").value,
        location: document.getElementById("location").value,
        section: document.getElementById("section").value,
        subsection: document.getElementById("subsection").value,
        content: editor.getHTML()
      };

      const res = await fetch("/api/articles/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();
      if (data.success) {
        alert("Článek uložen");
        window.location.href = "/admin/articles";
      }
    });
  </script>  </main>  </body></html>

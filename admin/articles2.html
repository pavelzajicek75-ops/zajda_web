<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Seznam článků</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background:#0b0c10; color:#e5e5e5; font-family:system-ui; padding:20px; margin:0; }
    h1 { margin-top:0; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:10px; border-bottom:1px solid #1f2937; text-align:left; }
    th { background:#111827; }
    tr:hover { background:#1f2937; }
    img { width:60px; border-radius:6px; }
    .btn { padding:8px 12px; border-radius:6px; text-decoration:none; font-weight:600; cursor:pointer; border:none; }
    .btn-primary { background:#22c55e; color:#0b0c10; }
    .btn-primary:hover { background:#16a34a; }
    .btn-danger { background:#ef4444; color:#fff; }
    .btn-danger:hover { background:#dc2626; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; }
    .error { color:#fca5a5; margin-bottom:10px; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>Seznam článků</h1>
  <a href="/admin/new-article.html" class="btn btn-primary">➕ Nový článek</a>
</div>

<div id="error" class="error" style="display:none;"></div>

<table id="articles">
  <thead>
    <tr>
      <th>Obrázek</th>
      <th>Název</th>
      <th>Datum</th>
      <th>ID</th>
      <th>Akce</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const token = localStorage.getItem('adminToken');
if (!token) window.location.href = "/admin/login.html";

const errorEl = document.getElementById('error');
const tbody = document.querySelector('#articles tbody');

async function loadArticles() {
  const res = await fetch('/api/admin/articles', {
    headers: { 'Authorization': 'Bearer ' + token }
  });

  if (!res.ok) {
    errorEl.style.display = 'block';
    errorEl.textContent = 'Nepodařilo se načíst články.';
    return;
  }

  const articles = await res.json();
  tbody.innerHTML = '';

  articles.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  for (const a of articles) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${a.image ? `<img src="${a.image}" alt="">` : ''}</td>
      <td>${a.title || '(bez názvu)'}</td>
      <td>${new Date(a.createdAt).toLocaleDateString('cs-CZ')}</td>
      <td>${a.id || '-'}</td>
      <td>
        <a href="/admin/edit-article.html?id=${a.id}" class="btn btn-primary">Upravit</a>
        <button class="btn btn-danger" onclick="deleteArticle('${a.id}')">Smazat</button>
      </td>
    `;
    tbody.appendChild(tr);
  }
}

async function deleteArticle(id) {
  if (!confirm('Opravdu smazat tento článek?')) return;

  const res = await fetch('/api/admin/articles/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  });

  if (res.ok) {
    loadArticles();
  } else {
    alert('Nepodařilo se smazat článek.');
  }
}

loadArticles();
</script>

</body>
</html>

<!DOCTYPE html><html lang="cs"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Přihlášení</title><style>form[data-astro-cid-rf56lckb]{display:flex;flex-direction:column;gap:15px;max-width:400px;margin-top:20px}input[data-astro-cid-rf56lckb]{padding:12px;border-radius:8px;border:1px solid #444;background:#1e1e1e;color:#fff}button[data-astro-cid-rf56lckb]{padding:12px;background:#4a90e2;border:none;border-radius:8px;color:#fff;cursor:pointer}button[data-astro-cid-rf56lckb]:hover{background:#357ac8}
</style></head> <body> <main>  <h1 data-astro-cid-rf56lckb>Přihlášení</h1> <form id="loginForm" data-astro-cid-rf56lckb> <label data-astro-cid-rf56lckb>Uživatel</label> <input type="text" id="username" data-astro-cid-rf56lckb> <label data-astro-cid-rf56lckb>Heslo</label> <input type="password" id="password" data-astro-cid-rf56lckb> <button type="button" id="loginBtn" data-astro-cid-rf56lckb>Přihlásit</button> </form>  <script type="module">
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem("admin_token", data.token);
        window.location.href = "/admin";
      } else {
        alert("Špatné přihlašovací údaje");
      }
    }

    document.getElementById("loginBtn").addEventListener("click", login);
  </script>  </main> </body></html>

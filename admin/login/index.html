<!DOCTYPE html><html lang="cs" data-astro-cid-2kanml4j> <head><meta charset="utf-8"><title>Přihlášení</title><style>body{background:#111;color:#fff;font-family:sans-serif;margin:0;padding:20px}nav[data-astro-cid-2kanml4j]{display:flex;gap:20px;background:#222;padding:10px 20px;margin-bottom:30px}nav[data-astro-cid-2kanml4j] a[data-astro-cid-2kanml4j]{color:#4a90e2;text-decoration:none}nav[data-astro-cid-2kanml4j] a[data-astro-cid-2kanml4j]:hover{text-decoration:underline}
</style></head> <body data-astro-cid-2kanml4j>  <h1>Přihlášení</h1> <form id="loginForm" style="display:flex;flex-direction:column;gap:15px;max-width:300px;"> <label>Uživatel</label> <input type="text" id="username" style="padding:10px;"> <label>Heslo</label> <input type="password" id="password" style="padding:10px;"> <button type="button" id="loginBtn" style="padding:10px;background:#4a90e2;border:none;color:white;">
Přihlásit
</button> </form> <script type="module">
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem("admin_token", data.token);
        window.location.href = "/admin";
      } else {
        alert("Špatné přihlašovací údaje");
      }
    }

    document.getElementById("loginBtn").addEventListener("click", login);
  </script>  </body></html>

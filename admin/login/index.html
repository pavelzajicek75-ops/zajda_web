</style><script type="module">
</script></head> <body data-astro-cid-2kanml4j> <header data-astro-cid-2kanml4j> <nav data-astro-cid-2kanml4j> <a href="/admin" data-astro-cid-2kanml4j>Dashboard</a> <a href="/admin/articles" data-astro-cid-2kanml4j>Články</a> <a href="/admin/sections" data-astro-cid-2kanml4j>Sekce</a> <a href="/admin/subsections" data-astro-cid-2kanml4j>Podsekce</a> </nav> <div class="logout" onclick="logout()" data-astro-cid-2kanml4j>Odhlásit</div> </header> <main data-astro-cid-2kanml4j>  <h1>Přihlášení</h1> <form id="loginForm"> <label>Uživatel</label> <input type="text" id="username"> <label>Heslo</label> <input type="password" id="password"> <button type="button" id="loginBtn">Přihlásit</button> </form> <script type="module">
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem("admin_token", data.token);
        window.location.href = "/admin";
      } else {
        alert("Špatné přihlašovací údaje");
      }
    }

    // Tohle je klíčové – připojí funkci k tlačítku
    document.getElementById("loginBtn").addEventListener("click", login);
  </script>  </main>  </body> </html>

<!DOCTYPE html><html> <head><title>Přihlášení</title></head> <body>  <h1>Přihlášení</h1> <form id="loginForm"> <label>Uživatel</label> <input type="text" id="username"> <label>Heslo</label> <input type="password" id="password"> <button type="button" id="loginBtn">Přihlásit</button> </form> <script type="module">
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem("admin_token", data.token);
        window.location.href = "/admin";
      } else {
        alert("Špatné přihlašovací údaje");
      }
    }

    document.getElementById("loginBtn").addEventListener("click", login);
  </script>  </body></html>

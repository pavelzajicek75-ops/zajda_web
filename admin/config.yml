backend:
  name: github
  repo: pavelzajicek75-ops/zajda_web
  branch: main
  base_url: https://fancy-math-7491.pavel-zajicek75.workers.dev
  auth_endpoint: auth

media_folder: "assets/img"
public_folder: "/assets/img"

media_library:
  name: uploadcare
  config:
    publicKey: 'demopublickey'
    imageShrink: '1600x1600 80%' 
    tabs: 'file camera facebook instagram url'
    previewStep: true

locale: 'cs'

collections:
  - name: "obsah"
    label: "Veškerý obsah"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Hlavní sekce"
        name: "main_section"
        widget: "select"
        options: ["Fotografování", "Cestování", "Projekty"]
        required: true
      - label: "Podsekce (vlastní)"
        name: "category"
        widget: "string"
        required: true
      - {label: "Nadpis", name: "title", widget: "string"}
      - {label: "Stát", name: "country", widget: "string", required: true}
      - {label: "Datum", name: "date", widget: "datetime", required: true}
      - label: "Obrázek"
        name: "image"
        widget: "image"
        hint: "ZLATÝ STANDARD: V editoru uvidíš velikost v KB. Cíl je pod 500 KB."
      - label: "Text článku"
        name: "body"
        widget: "markdown"

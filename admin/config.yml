backend:
  name: github
  repo: pavelzajicek75-ops/zajda_web
  branch: main
  base_url: https://fancy-math-7491.pavel-zajicek75.workers.dev
  auth_endpoint: auth

media_library:
  name: uploadcare
  config:
    publicKey: 'demopublickey'
    previewStep: true
    effects: 'crop, resize, quality'

locale: 'cs'

collections:
  - name: "obsah"
    label: "Veškerý obsah"
    folder: "_posts"
    create: true
    fields:
      - {label: "Hlavní sekce", name: "main_section", widget: "select", options: ["Fotografování", "Cestování", "Projekty"]}
      - {label: "Nadpis", name: "title", widget: "string"}
      - {label: "Datum", name: "date", widget: "datetime"}
      - label: "Obrázek"
        name: "image"
        widget: "image"
        media_library:
          config:
            previewStep: true
            effects: 'crop, resize, quality'
      - {label: "Text článku", name: "body", widget: "markdown"}

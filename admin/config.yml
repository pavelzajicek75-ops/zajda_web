backend:
  name: github
  repo: "pavelzajicek75-ops/zajda_web"
  branch: main

media_library:
  name: cloudinary
  config:
    cloud_name: "dvfllu1oi"
    api_key: "593859341857225"
    api_secret: "xfKy9PX9RwvKws8Q8inDynY5z4sM"

collections:
  - name: "blog"
    label: "Články"
    folder: "posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Nadpis", name: "title", widget: "string"}
      - {label: "Kategorie", name: "category", widget: "select", options: ["Cestování", "Fotografie", "Projekty"]}
      - {label: "Hlavní fotka", name: "image", widget: "image"}
      - {label: "Text článku", name: "body", widget: "markdown"}

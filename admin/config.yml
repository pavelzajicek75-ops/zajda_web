backend:
  name: github
  repo: pavelzajicek75-ops/zajda_web
  branch: main
  base_url: https://fancy-math-7491.pavel-zajicek75.workers.dev
  auth_endpoint: auth

media_folder: "assets/img"
public_folder: "/assets/img"

media_library:
  name: uploadcare
  config:
    publicKey: 'demopublickey' # Pro plnou kontrolu doporučuji vlastní klíč později
    # imageShrink jsme zrušili jako automatiku, aby ses v tom mohl vrtat RUČNĚ
    tabs: 'file camera facebook instagram url'
    previewStep: true
    # Zapíná editor s manuální kompresí a rozlišením
    effects: 'crop, rotate, mirror, flip, enhance, sharp, blur'

locale: 'cs'

collections:
  - name: "obsah"
    label: "Veškerý obsah"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Hlavní sekce"
        name: "main_section"
        widget: "select"
        options: ["Fotografování", "Cestování", "Projekty"]
      - label: "Podsekce"
        name: "category"
        widget: "string"
      - {label: "Nadpis", name: "title", widget: "string"}
      - {label: "Stát", name: "country", widget: "string", required: true}
      - {label: "Datum", name: "date", widget: "datetime", required: true}
      - {label: "Obrázek", name: "image", widget: "image"}
      - {label: "Text článku", name: "body", widget: "markdown"}

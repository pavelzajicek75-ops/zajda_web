backend:
  name: github
  repo: pavelzajicek75-ops/zajda_web
  branch: main
  base_url: https://fancy-math-7491.pavel-zajicek75.workers.dev
  auth_endpoint: auth

media_folder: "assets/img"
public_folder: "/assets/img"

media_library:
  name: uploadcare
  config:
    publicKey: 'demopublickey' # Umožňuje nahrávání z webu, soc. sítí a ořez

locale: 'cs'

collections:
  - name: "obsah"
    label: "Veškerý obsah"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Hlavní sekce"
        name: "main_section"
        widget: "select"
        options: ["Fotografování", "Cestování", "Projekty"]
        required: true

      - label: "Podsekce (např. Island 2025, Portréty...)"
        name: "category"
        widget: "string" # Tady si prostě napíšeš název nové podsekce
        required: true

      - {label: "Nadpis", name: "title", widget: "string"}
      
      - label: "Stát"
        name: "country"
        widget: "string"
        required: true

      - label: "Datum (Povinné)"
        name: "date"
        widget: "datetime"
        required: true

      - {label: "Hlavní obrázek", name: "image", widget: "image"}

      - label: "Text článku (Nadpisy piš s # na začátku)"
        name: "body"
        widget: "markdown"

backend:
  name: github
  repo: pavelzajicek75-ops/zajda_web
  branch: main

media_library:
  name: cloudinary
  config:
    cloud_name: dul1lu1oi
    api_key: "593899341857225"
    unsigned_upload: true
    upload_preset: zajda555

collections:
  - name: "blog"
    label: "Články"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titulek", name: "title", widget: "string"}
      - {label: "Obrázek", name: "image", widget: "image"}
      - {label: "Text", name: "body", widget: "markdown"}

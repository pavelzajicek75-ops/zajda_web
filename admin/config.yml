backend:
  name: github
  repo: pavelzajicek75-ops/zajda_web
  branch: main
  base_url: https://fancy-math-7491.pavel-zajicek75.workers.dev
  auth_endpoint: auth

# Nastavení fotek - ukládají se přímo k tobě do GitHubu
media_folder: "assets/img"
public_folder: "/assets/img"

# Admin v češtině
locale: 'cs'

# Nastavení editoru
editor:
  preview: true

collections:
  - name: "blog"
    label: "Články"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titulek", name: "title", widget: "string"}
      - {label: "Datum", name: "date", widget: "datetime"}
      - {label: "Hlavní obrázek", name: "image", widget: "image"}
      - {label: "Text článku", name: "body", widget: "markdown"}

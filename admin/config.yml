backend:
  name: github
  repo: pavelzajicek75-ops/zajda_web
  branch: main
  # Tvoje nová brána, kterou jsme právě postavili:
  base_url: https://fancy-math-7491.pavel-zajicek75.workers.dev
  auth_endpoint: auth

# Kam se budou ukládat fotky, až je tam začneš sázet
media_folder: "assets/img"
public_folder: "/assets/img"

collections:
  - name: "blog"
    label: "Články"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Titulek", name: "title", widget: "string"}
      - {label: "Datum", name: "date", widget: "datetime"}
      - {label: "Hlavní obrázek", name: "image", widget: "image", required: false}
      - {label: "Text článku", name: "body", widget: "markdown"}
